name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        uses: digreatbrian/buildozer-action@v2
        with:
          work-dir: .
          buildozer-cmd: buildozer android debug
          python-version: "3.10"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cgpa-apk
          path: bin/*.apk
